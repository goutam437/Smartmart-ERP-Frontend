<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartMart ERP | Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="erp-layout">

    <!--SIDEBAR-->
         
    <aside class="sidebar" id="sidebar">

        <div class="sidebar-logo">
            <div class="logo-icon">🛒</div>
            <div class="logo-text">
                <span class="logo-name">SmartMart</span>
                <span class="logo-sub">ERP System</span>
            </div>
        </div>

        <div class="sidebar-user">
            <div class="user-avatar" id="sidebarAvatar">A</div>
            <div class="user-info">
                <div class="user-name" id="sidebarName">Admin</div>
                <div class="user-role">Administrator</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-label">Main Menu</div>

            <a class="nav-item active" onclick="loadModule('dashboard', this)">
                <span class="nav-icon">📊</span>
                <span class="nav-text">Dashboard</span>
            </a>
            <a class="nav-item" onclick="loadModule('billing', this)">
                <span class="nav-icon">🧾</span>
                <span class="nav-text">Billing / POS</span>
            </a>
            <a class="nav-item" onclick="loadModule('inventory', this)">
                <span class="nav-icon">📦</span>
                <span class="nav-text">Inventory</span>
            </a>

            <div class="nav-label">Management</div>

            <a class="nav-item" onclick="loadModule('customers', this)">
                <span class="nav-icon">👥</span>
                <span class="nav-text">Customers</span>
            </a>
            <a class="nav-item" onclick="loadModule('sales', this)">
                <span class="nav-icon">💰</span>
                <span class="nav-text">Sales</span>
            </a>
            <a class="nav-item" onclick="loadModule('settings', this)">
                <span class="nav-icon">⚙️</span>
                <span class="nav-text">Settings</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a class="nav-item logout-item" onclick="handleLogout()">
                <span class="nav-icon">🚪</span>
                <span class="nav-text">Logout</span>
            </a>
        </div>

    </aside>

    <!--MAIN CONTENT--> 
         
    <div class="main-wrap">

        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <span class="page-title" id="pageTitle">Dashboard</span>
            </div>
            <div class="topbar-right">
                <div class="topbar-user">
                    <div class="topbar-avatar" id="topbarAvatar">A</div>
                    <span class="topbar-name" id="topbarName">Admin</span>
                </div>
            </div>
        </header>

        <!-- Content Area — JS inject karega -->
        <main class="content" id="content-area"></main>

    </div>

</div>

<!-- ════ PRODUCT MODAL ════ -->
<div class="modal-overlay" id="productModal">
    <div class="modal-box">
        <div class="modal-head">
            <h3 id="modalTitle">Add Product</h3>
            <button class="modal-close" onclick="closeModal('productModal')">✕</button>
        </div>
        <div class="form-row-2">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="prodName" placeholder="e.g. Wireless Mouse">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="prodCategory">
                    <option>Electronics</option>
                    <option>Furniture</option>
                    <option>Stationery</option>
                    <option>Grocery</option>
                    <option>Clothing</option>
                </select>
            </div>
        </div>
        <div class="form-row-2">
            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" id="prodPrice" placeholder="Amount">
            </div>
            <div class="form-group">
                <label>GST Rate (%)</label>
                <select id="prodGst">
                    <option value="2" selected>2%</option>
                    <option value="5">5%</option>
                    <option value="12">12%</option>
                    <option value="18">18%</option>
                    <option value="28">28%</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Stock Quantity</label>
            <input type="number" id="prodStock" placeholder="e.g. 50">
        </div>
        <button class="btn btn-primary btn-full" onclick="submitProduct()">
            💾 Save Product
        </button>
    </div>
</div>

<!-- CUSTOMER MODAL -->
<div class="modal-overlay" id="customerModal">
    <div class="modal-box">
        <div class="modal-head">
            <h3>Add Customer</h3>
            <button class="modal-close" onclick="closeModal('customerModal')">✕</button>
        </div>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="custName" placeholder="Enter name">
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="custPhone" placeholder="e.g. 9876543210">
        </div>
        <div class="form-group">
            <label>Email (Optional)</label>
            <input type="email" id="custEmail" placeholder="Enter email">
        </div>
        <button class="btn btn-primary btn-full" onclick="submitCustomer()">
            💾 Save Customer
        </button>
    </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script src="js/app.js"></script>

</body>
</html>
